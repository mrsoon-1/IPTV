<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IPTV by Stefano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px 10px;
    font-size: 22px;
    font-weight: 600;
    color: #4db8ff;
}

/* CONTAINER */
.container {
    padding: 15px;
    max-width: 700px;
    margin: auto;
}

/* CARD BASE */
.card {
    background: #121821;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* TITOLI */
.card h2 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #9fb3c8;
    font-weight: 500;
}

/* BOTTONE PRINCIPALE: ACCENDI LA TV */
.main-btn {
    width: 100%;
    padding: 22px;
    font-size: 22px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #ff416c, #ff4b2b);
    color: white;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.main-btn:hover {
    background: linear-gradient(90deg, #ff4b2b, #ff416c);
    box-shadow: 0 0 25px rgba(255, 75, 43, 0.7);
    transform: translateY(-2px);
}

/* LAYOUT AFFIANCATO (LISTA + GESTIONE) */
.split-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.split-row .card {
    flex: 1;
    margin-bottom: 0;
}

/* SEZIONE GESTIONE INTERNA */
.btn-row {
    display: flex;
    gap: 8px;
}

.btn-row .link-btn {
    flex: 1;
}

/* BOTTONI SECONDARI PIÙ COMPATTI */
.btn-small {
    width: 100%;
    padding: 12px 2px;
    font-size: 13px;
    border-radius: 10px;
    border: none;
    background: #1c2532;
    color: #dce3ea;
    cursor: pointer;
    text-align: center;
    font-weight: 500;
    transition: background 0.2s;
}

.btn-small:hover {
    background: #253346;
}

/* COPY BOX */
.copy-box {
    background: #1a222e;
    border-radius: 12px;
    padding: 10px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.copy-btn {
    background: #007aff;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    color: white;
    font-size: 13px;
    cursor: pointer;
}

.link-btn {
    text-decoration: none;
    display: block;
}

/* RESPONSIVE */
@media (max-width: 580px) {
    .split-row {
        flex-direction: column;
        gap: 15px;
    }
}
</style>
</head>

<body>

<div class="header">📺 IPTV by Stefano</div>

<div class="container">

    <!-- AVVIO RAPIDO -->
    <div class="card">
        <h2>Avvio rapido</h2>
        <button class="main-btn" onclick="openTV()">
            <span>📺</span> Accendi la TV
        </button>
    </div>

    <!-- RIGA CON LISTA CANALI E GESTIONE AFFIANCATI -->
    <div class="split-row">
        <!-- URL LISTA -->
        <div class="card">
            <h2>Lista canali</h2>
            <div class="copy-box">
                <span>iptvitaplus.m3u</span>
                <button class="copy-btn" onclick="copyURL()">Copia</button>
            </div>
        </div>

        <!-- AZIONI DI GESTIONE -->
        <div class="card">
            <h2>Gestione</h2>
            <div class="btn-row">
                <a href="https://m3u-ip.tv/browser/settings/index.html#add_playlist" class="link-btn">
                    <button class="btn-small">➕ Playlist</button>
                </a>

                <a href="https://m3u-ip.tv/browser/settings/" class="link-btn">
                    <button class="btn-small">⚙️ Impostazioni</button>
                </a>
            </div>
        </div>
    </div>

</div>

<script>
const playlist = "https://raw.githubusercontent.com/Tundrak/IPTV-Italia/main/iptvitaplus.m3u";

function copyURL() {
    navigator.clipboard.writeText(playlist).then(() => {
        alert("✅ URL copiato");
    });
}

function openTV() {
    const url = "https://m3u-ip.tv/browser/?url=" + encodeURIComponent(playlist);
    window.location.href = url;
}
</script>

</body>
</html>
